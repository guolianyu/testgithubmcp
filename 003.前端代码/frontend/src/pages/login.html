<style>
        .sakura-lavender-gradient {
            background: linear-gradient(135deg, #fbb3c1 0%, #C9B8E8 100%);
        }
        .soft-glow {
            box-shadow: 0 12px 48px -12px rgba(134, 78, 90, 0.12);
        }
        .bg-cream-white {
            background-color: #FFF9F5;
        }
        .bg-pale-pink-white {
            background-color: #FFF0F3;
        }
    </style>
</head>
<body class="bg-cream-white font-body-md text-on-background min-h-screen flex items-center justify-center p-md relative overflow-hidden">
<!-- Abstract decorative background elements -->
<div class="absolute top-[-15%] left-[-15%] w-[50%] h-[50%] rounded-full bg-primary-container/20 blur-[140px]"></div>
<div class="absolute bottom-[-15%] right-[-15%] w-[50%] h-[50%] rounded-full bg-secondary-container/20 blur-[140px]"></div>
<main class="w-full max-w-[440px] z-10">
<!-- Logo and Brand Section -->
<div class="text-center mb-10">
<h1 class="font-h1 text-h1 text-primary mb-2 flex items-center justify-center gap-2">
<span class="text-3xl">💰</span>
<span>财务管家</span>
</h1>
<p class="font-body-md text-body-md text-outline tracking-wide">
                贴心的财务小助手
            </p>
</div>
<!-- Login Card -->
<div class="bg-pale-pink-white p-8 md:p-10 rounded-xxl soft-glow border border-primary-container/20">
<div class="mb-8">
<h2 class="font-h2 text-h2 text-on-surface-variant">欢迎回来</h2>
<p class="font-body-sm text-body-sm text-outline mt-2">请输入您的账户信息以管理财务</p>
</div>
<form class="space-y-6">
<!-- Username Input -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest block px-1" for="username">用户名</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="person">person</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-lowest border border-outline-variant rounded-xl focus:outline-none focus:ring-4 focus:ring-primary-container/30 focus:border-primary transition-all font-body-md text-on-surface placeholder:text-outline/40" id="username" placeholder="请输入用户名" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest block" for="password">密码</label>
<a class="font-label-md text-label-md text-primary hover:text-on-primary-container transition-colors font-bold" href="#">忘记密码？</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-lowest border border-outline-variant rounded-xl focus:outline-none focus:ring-4 focus:ring-primary-container/30 focus:border-primary transition-all font-body-md text-on-surface placeholder:text-outline/40" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Login Button -->
<div class="pt-4">
<button class="w-full sakura-lavender-gradient text-on-primary py-4 rounded-full font-h3 text-h3 shadow-xl shadow-primary-container/40 hover:brightness-105 active:scale-[0.97] transition-all flex items-center justify-center gap-2 group" type="button" onclick="handleLogin()">
<span>立即登录</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="login">login</span>
</button>
</div>
</form>
<!-- Register Link -->
<div class="mt-10 text-center space-y-3">
<p class="font-body-sm text-body-sm text-outline">
                    还没有账号？
                    <a class="font-label-md text-primary font-bold hover:underline underline-offset-4 ml-1" href="register.html">立即注册</a>
</p>
<p class="font-body-sm text-body-sm text-outline">
                    或
                    <a class="font-label-md text-secondary font-bold hover:underline underline-offset-4 ml-1" href="dashboard.html">游客模式</a>
</p>
</div>
</div>
<!-- Security Badge -->
<div class="mt-8 flex items-center justify-center gap-2 opacity-60">
<span class="material-symbols-outlined text-outline text-lg" data-icon="verified_user">verified_user</span>
<span class="font-label-md text-label-md text-outline tracking-wide">银行级数据加密保护1</span>
</div>
</main>
<!-- Background Decoration Image -->
<img class="fixed top-0 left-0 w-full h-full object-cover -z-20 opacity-[0.04] pointer-events-none" data-alt="Abstract soft waves of silk fabric in pale pink and cream white colors, gentle lighting and professional studio photography style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC9z0Vd1h02vLcWdIt2IY1OD0U6PYMU4MFWR2a1blb6DU3IVrCKHdRUAF_lFSPsgQTwidyv2sbZ01nQ1PT6-cVMff2qgew2ORPA5-yl23kG4RCvWQSIHdypeLsjfv6txauHPmpLBFqYRUCJ8CvfPutWOyYXk-UdtkqbvTCI0f-N6j9jFOerD5q24htE4fO4b4UgbQW6MIj38XDJoHS8OZWGxze8STgDgL_uL7D8ntdmaAc7hi19q8I2TZzTkN2Uda9V8AjfHVPGwXg"/>

<script>
// 简单的登录处理逻辑
function handleLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username) {
        alert('请输入用户名');
        return;
    }
    if (!password) {
        alert('请输入密码');
        return;
    }

    // 模拟登录成功，跳转到仪表板
    // 实际项目中应该调用后端API验证
    window.location.href = 'dashboard.html';
}
</script>
</body></html>
