<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>注册账号 - 财务管家</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {

            theme: {
                extend: {
                    "colors": {
                        "error": "#ba1a1a",

                        "primary-fixed-dim": "#fbb3c1",

                        "inverse-primary": "#fbb3c1",
                        "inverse-surface": "#303030",
                        "surface-bright": "#fbf9f8",
                        "primary-fixed": "#ffd9df",
                        "secondary-fixed": "#eaddff",
                        "surface-container-low": "#f5f3f3",
                        "on-tertiary-container": "#8f364a",
                        "tertiary-fixed-dim": "#ffb2bd",
                        "on-surface": "#1b1c1c",
                        "on-tertiary-fixed-variant": "#7d283c",
                        "surface-variant": "#e4e2e2",
                        "tertiary": "#9b4053",
                        "surface-container-lowest": "#ffffff",
                        "secondary": "#655781",
                        "surface-container": "#efeded",
                        "primary-container": "#ffb7c5",

                        "on-secondary-fixed-variant": "#4d4068",

                        "outline-variant": "#d6c2c4",

                        "on-background": "#1b1c1c",
                        "outline": "#837375",
                        "on-tertiary-fixed": "#400014",
                        "secondary-container": "#deccfd",
                        "on-primary-fixed": "#360c19",
                        "surface-tint": "#864e5a",
                        "tertiary-fixed": "#ffd9dd",
                        "on-secondary-fixed": "#21143a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "xxl": "1.5rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "xxl": "48px",

                        "lg": "24px",
                        "md": "16px",
                        "margin": "20px",
                        "gutter": "16px",

                        "xl": "32px"
                    },
                    "fontFamily": {

                        "body-sm": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],

                }
            }
        }
    </script>
<style>
        .sakura-lavender-gradient {
            background: linear-gradient(135deg, #fbb3c1 0%, #C9B8E8 100%);
        }
        .soft-glow {
            box-shadow: 0 12px 48px -12px rgba(134, 78, 90, 0.12);
        }
        .bg-cream-white {
            background-color: #FFF9F5;
        }
        .bg-pale-pink-white {
            background-color: #FFF0F3;
        }
    </style>
</head>
<body class="bg-cream-white font-body-md text-on-background min-h-screen flex items-center justify-center p-md relative overflow-hidden">
<!-- Abstract decorative background elements -->
<div class="absolute top-[-15%] left-[-15%] w-[50%] h-[50%] rounded-full bg-primary-container/20 blur-[140px]"></div>
<div class="absolute bottom-[-15%] right-[-15%] w-[50%] h-[50%] rounded-full bg-secondary-container/20 blur-[140px]"></div>
<main class="w-full max-w-[440px] z-10">
<!-- Logo and Brand Section -->
<div class="text-center mb-10">
<h1 class="font-h1 text-h1 text-primary mb-2 flex items-center justify-center gap-2">
<span class="text-3xl">💰</span>
<span>财务管家</span>
</h1>
<p class="font-body-md text-body-md text-outline tracking-wide">
                开启智能理财之旅
            </p>
</div>
<!-- Register Card -->
<div class="bg-pale-pink-white p-8 md:p-10 rounded-xxl soft-glow border border-primary-container/20">
<div class="mb-8">
<h2 class="font-h2 text-h2 text-on-surface-variant">创建账号</h2>
<p class="font-body-sm text-body-sm text-outline mt-2">请填写以下信息完成注册</p>
</div>
<form class="space-y-6">
<!-- Username Input -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest block px-1" for="username">用户名</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="person">person</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-lowest border border-outline-variant rounded-xl focus:outline-none focus:ring-4 focus:ring-primary-container/30 focus:border-primary transition-all font-body-md text-on-surface placeholder:text-outline/40" id="username" placeholder="4-20位字母或数字" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest block px-1" for="password">设置密码</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-lowest border border-outline-variant rounded-xl focus:outline-none focus:ring-4 focus:ring-primary-container/30 focus:border-primary transition-all font-body-md text-on-surface placeholder:text-outline/40" id="password" placeholder="6-20位密码" type="password"/>
</div>
</div>
<!-- Confirm Password Input -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest block px-1" for="confirmPassword">确认密码</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="lock_reset">lock_reset</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-lowest border border-outline-variant rounded-xl focus:outline-none focus:ring-4 focus:ring-primary-container/30 focus:border-primary transition-all font-body-md text-on-surface placeholder:text-outline/40" id="confirmPassword" placeholder="再次输入密码" type="password"/>
</div>
</div>
<!-- Register Button -->
<div class="pt-4">
<button class="w-full sakura-lavender-gradient text-on-primary py-4 rounded-full font-h3 text-h3 shadow-xl shadow-primary-container/40 hover:brightness-105 active:scale-[0.97] transition-all flex items-center justify-center gap-2 group" type="button" onclick="handleRegister()">
<span>立即注册</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="how_to_reg">how_to_reg</span>
</button>
</div>
</form>
<!-- Login Link -->
<div class="mt-10 text-center space-y-3">
<p class="font-body-sm text-body-sm text-outline">
                    已有账号？
                    <a class="font-label-md text-primary font-bold hover:underline underline-offset-4 ml-1" href="login.html">立即登录</a>
</p>
</div>
</div>
<!-- Security Badge -->
<div class="mt-8 flex items-center justify-center gap-2 opacity-60">
<span class="material-symbols-outlined text-outline text-lg" data-icon="verified_user">verified_user</span>
<span class="font-label-md text-label-md text-outline tracking-wide">银行级数据加密保护</span>
</div>
</main>

<script>
// 简单的注册处理逻辑
function handleRegister() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (!username) {
        alert('请输入用户名');
        return;
    }
    if (username.length < 4 || username.length > 20) {
        alert('用户名长度应为4-20个字符');
        return;
    }
    if (!password) {
        alert('请输入密码');
        return;
    }
    if (password.length < 6) {
        alert('密码长度应不少于6位');
        return;
    }
    if (password !== confirmPassword) {
        alert('两次输入的密码不一致');
        return;
    }

    // 模拟注册成功，跳转到登录页
    alert('注册成功！请登录。');
    window.location.href = 'login.html';
}
</script>
</body></html>
